- name: Update DB
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 🌟 파일이 지워졌더라도 여기서 빈 파일을 다시 만들어 로봇을 안심시킵니다.
          touch last_link.txt
          
          # 모든 변경 사항(새로 생긴 파일 포함)을 깃에게 알려줍니다.
          git add .
          
          # 변경 내용이 있을 때만 저장합니다.
          git commit -m "Update last link" || echo "No changes to commit"
          git push
