- name: Update DB
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 🌟 파일이 없으면 빈 파일이라도 생성해서 에러를 방지합니다.
          touch last_link.txt
          
          # 파일 이름을 직접 지정하지 않고 현재 폴더의 모든 변화를 기록합니다.
          git add .
          
          # 변경 내용이 있을 때만 저장하고, 없으면 조용히 넘어갑니다.
          git commit -m "Update last link" || echo "No changes to commit"
          git push
