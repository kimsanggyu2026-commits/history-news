name: NIKH Notifier

on:
  schedule:
    - cron: '0 * * * *'  # 1시간마다 실행
  workflow_dispatch:      # 수동 실행

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 🌟 저장소에 파일을 쓸 수 있는 권한

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run logic
        env:
          PYTHONUNBUFFERED: 1
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py

      - name: Update DB
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 🌟 생성된 모든 txt 파일을 챙깁니다.
          git add *.txt
          
          # 변경사항이 있을 때만 저장합니다.
          git commit -m "Update history records" || echo "No changes to commit"
          
          # 서버 최신화 및 업로드
          git pull --rebase origin main
          git push
